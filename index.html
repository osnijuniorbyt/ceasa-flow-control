<!DOCTYPE html>
<html lang="pt-BR">
  <head>

    <meta name="description" content="Sistema móvel de controle de fluxo para HORTECH" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/pwa-512x512.png" color="#16a34a" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Splash Screens for iPhone 15 Pro Max -->
    <link rel="apple-touch-startup-image" 
          href="/pwa-512x512.png"
          media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />

          href="/pwa-512x512.png"
          media="(device-width: 932px) and (device-height: 430px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)" />
    
    <!-- Splash Screens for other iPhone models -->
    <link rel="apple-touch-startup-image" 
          href="/pwa-512x512.png"
          media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />

          href="/pwa-512x512.png"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />

    <!-- Open Graph -->
    <meta property="og:title" content="HORTECH Mobile" />
    <meta property="og:description" content="Sistema móvel de controle de fluxo para HORTECH" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/pwa-512x512.png" />
